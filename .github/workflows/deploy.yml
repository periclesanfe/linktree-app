name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite executar manualmente

env:
  APP_PATH: ~/linktree-app

jobs:
  deploy:
    name: Deploy to GCE
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Debug SSH auth
        run: |
          ssh -vvv -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo SSH_AUTH_OK"

      - name: Deploy to server
        run: |
          ssh -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e
            
            echo "📁 Navigating to app directory..."
            cd ~/linktree-app
            
            echo "📥 Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main
            
            echo "🐳 Stopping current containers..."
            docker compose -f docker-compose.prod.yml --env-file .env.production down
            
            echo "🔨 Building and starting containers..."
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
            
            echo "🧹 Cleaning up old images..."
            docker image prune -f
            
            echo "✅ Deployment complete!"
            
            echo "📊 Container status:"
            docker compose -f docker-compose.prod.yml ps
          ENDSSH

      - name: Health check
        run: |
          echo "⏳ Waiting for services to start..."
          sleep 30
          
          echo "🔍 Checking frontend..."
          curl -sSf https://meuhub.app.br/ > /dev/null && echo "✅ Frontend OK" || echo "❌ Frontend failed"
          
          echo "🔍 Checking backend API..."
          curl -sSf https://meuhub.app.br/api/health > /dev/null && echo "✅ Backend OK" || echo "❌ Backend failed"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Check the logs above for details."
